blueprint:
  name: IKEA BILRESA Scroll Wheel – 3 Lichter (Thread/Matter)
  description: >
    Steuere bis zu 3 Lichter (oder Gruppen) mit dem IKEA BILRESA Scroll Wheel (Thread).
    Einfach das Gerät auswählen – alle 9 Entitäten werden automatisch gemappt.

    **Szene 1 (LED 1):** Licht 1  
    **Szene 2 (LED 2):** Licht 2  
    **Szene 3 (LED 3):** Licht 3

    - Drücken: Licht ein/aus (oder eigene Aktion)
    - Drehen rechts: Heller
    - Drehen links: Dunkler

    Lichter sind optional – nicht belegte Szenen werden einfach ignoriert.
    Benötigt Home Assistant 2024.4 oder neuer.

  domain: automation

  input:
    remote:
      name: BILRESA Gerät
      description: Das IKEA BILRESA Scroll Wheel
      selector:
        device:
          integration: matter
          manufacturer: "IKEA of Sweden"
          model: "BILRESA scroll wheel"

    light1:
      name: Licht – Szene 1 (LED 1)
      description: Leer lassen um diese Szene zu deaktivieren
      default: {}
      selector:
        target:
          entity:
            domain: light

    light2:
      name: Licht – Szene 2 (LED 2)
      description: Leer lassen um diese Szene zu deaktivieren
      default: {}
      selector:
        target:
          entity:
            domain: light

    light3:
      name: Licht – Szene 3 (LED 3)
      description: Leer lassen um diese Szene zu deaktivieren
      default: {}
      selector:
        target:
          entity:
            domain: light

    brightness_step:
      name: Helligkeitsschritt (%)
      description: Wie viel Prozent pro Drehschritt
      default: 10
      selector:
        number:
          min: 1
          max: 50
          unit_of_measurement: "%"

    press_action_1:
      name: Szene 1 – Aktion bei Drücken (optional)
      description: Leer lassen für toggle. Oder z.B. eine HA-Szene aktivieren.
      default: []
      selector:
        action: {}

    press_action_2:
      name: Szene 2 – Aktion bei Drücken (optional)
      description: Leer lassen für toggle. Oder z.B. eine HA-Szene aktivieren.
      default: []
      selector:
        action: {}

    press_action_3:
      name: Szene 3 – Aktion bei Drücken (optional)
      description: Leer lassen für toggle. Oder z.B. eine HA-Szene aktivieren.
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: event
    event_type: state_changed

variables:
  remote: !input remote
  step: !input brightness_step
  light1: !input light1
  light2: !input light2
  light3: !input light3
  press_action_1: !input press_action_1
  press_action_2: !input press_action_2
  press_action_3: !input press_action_3
  fired: "{{ trigger.event.data.entity_id }}"
  # Taste-Nummer aus Entity-ID extrahieren (z.B. ...taste_3 → 3)
  taste_num: "{{ fired.split('_') | last | int(0) }}"

condition:
  # Nur reagieren wenn das Event vom BILRESA-Gerät kommt
  - condition: template
    value_template: "{{ device_id(fired) == remote }}"
  # Nur taste-Entitäten (1-9)
  - condition: template
    value_template: "{{ taste_num in range(1, 10) and 'taste' in fired }}"

action:
  - choose:

      # ── Szene 1: taste_1=increase, taste_2=decrease, taste_3=press ──
      - conditions: "{{ taste_num == 3 and light1 != {} }}"
        sequence:
          - if: "{{ press_action_1 | length == 0 }}"
            then:
              - action: light.toggle
                target: !input light1
            else: !input press_action_1

      - conditions: "{{ taste_num == 1 and light1 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light1
            data:
              brightness_step_pct: "{{ step | int }}"
              transition: 0.3

      - conditions: "{{ taste_num == 2 and light1 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light1
            data:
              brightness_step_pct: "{{ (step | int) * -1 }}"
              transition: 0.3

      # ── Szene 2: taste_4=increase, taste_5=decrease, taste_6=press ──
      - conditions: "{{ taste_num == 6 and light2 != {} }}"
        sequence:
          - if: "{{ press_action_2 | length == 0 }}"
            then:
              - action: light.toggle
                target: !input light2
            else: !input press_action_2

      - conditions: "{{ taste_num == 4 and light2 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light2
            data:
              brightness_step_pct: "{{ step | int }}"
              transition: 0.3

      - conditions: "{{ taste_num == 5 and light2 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light2
            data:
              brightness_step_pct: "{{ (step | int) * -1 }}"
              transition: 0.3

      # ── Szene 3: taste_7=increase, taste_8=decrease, taste_9=press ──
      - conditions: "{{ taste_num == 9 and light3 != {} }}"
        sequence:
          - if: "{{ press_action_3 | length == 0 }}"
            then:
              - action: light.toggle
                target: !input light3
            else: !input press_action_3

      - conditions: "{{ taste_num == 7 and light3 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light3
            data:
              brightness_step_pct: "{{ step | int }}"
              transition: 0.3

      - conditions: "{{ taste_num == 8 and light3 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light3
            data:
              brightness_step_pct: "{{ (step | int) * -1 }}"
              transition: 0.3
