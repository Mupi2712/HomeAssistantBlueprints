blueprint:
  name: IKEA BILRESA Scroll Wheel – 3 Lichter (Thread/Matter)
  description: >
    Steuere bis zu 3 Lichter (oder Gruppen) mit dem IKEA BILRESA Scroll Wheel (Thread).
    Einfach das Gerät auswählen – alle 9 Entitäten werden automatisch gemappt.

    **Szene 1 (LED 1):** Licht 1  
    **Szene 2 (LED 2):** Licht 2  
    **Szene 3 (LED 3):** Licht 3

    - Drücken: Licht ein/aus (oder eigene Aktion)
    - Drehen rechts: Heller
    - Drehen links: Dunkler

    Lichter sind optional – nicht belegte Szenen werden einfach ignoriert.
    Benötigt Home Assistant 2024.4 oder neuer.

  domain: automation

  input:
    remote:
      name: BILRESA Gerät
      description: Das IKEA BILRESA Scroll Wheel
      selector:
        device:
          integration: matter
          manufacturer: "IKEA of Sweden"
          model: "BILRESA scroll wheel"

    light1:
      name: Licht – Szene 1 (LED 1)
      description: Leer lassen um diese Szene zu deaktivieren
      default: {}
      selector:
        target:
          entity:
            domain: light

    light2:
      name: Licht – Szene 2 (LED 2)
      description: Leer lassen um diese Szene zu deaktivieren
      default: {}
      selector:
        target:
          entity:
            domain: light

    light3:
      name: Licht – Szene 3 (LED 3)
      description: Leer lassen um diese Szene zu deaktivieren
      default: {}
      selector:
        target:
          entity:
            domain: light

    brightness_step:
      name: Helligkeitsschritt (%)
      description: Wie viel Prozent pro Drehschritt
      default: 10
      selector:
        number:
          min: 1
          max: 50
          unit_of_measurement: "%"

    press_action_1:
      name: Szene 1 – Aktion bei Drücken (optional)
      description: Leer lassen für toggle. Oder z.B. eine HA-Szene aktivieren.
      default: []
      selector:
        action: {}

    press_action_2:
      name: Szene 2 – Aktion bei Drücken (optional)
      description: Leer lassen für toggle. Oder z.B. eine HA-Szene aktivieren.
      default: []
      selector:
        action: {}

    press_action_3:
      name: Szene 3 – Aktion bei Drücken (optional)
      description: Leer lassen für toggle. Oder z.B. eine HA-Szene aktivieren.
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: event
    event_type: state_changed

variables:
  remote: !input remote
  step: !input brightness_step
  light1: !input light1
  light2: !input light2
  light3: !input light3
  press_action_1: !input press_action_1
  press_action_2: !input press_action_2
  press_action_3: !input press_action_3
  fired: "{{ trigger.event.data.entity_id }}"
  # Nummer aus Entity-ID extrahieren (taste_3 → 3, schalterstellung_3 → 3)
  fired_num: "{{ fired.split('_') | last | int(0) }}"
  # Entitätstyp bestimmen
  is_taste: "{{ 'taste' in fired }}"
  is_schalter: "{{ 'schalterstellung' in fired }}"
  # Aktion aus Nummer ableiten (1/4/7=inc, 2/5/8=dec, 3/6/9=press)
  action_type: >
    {% set r = fired_num % 3 %}
    {% if r == 1 %}inc
    {% elif r == 2 %}dec
    {% else %}press{% endif %}
  # Szene aus Nummer ableiten
  scene_num: >
    {% if fired_num in [1,2,3] %}1
    {% elif fired_num in [4,5,6] %}2
    {% elif fired_num in [7,8,9] %}3
    {% else %}0{% endif %}

condition:
  # Nur vom BILRESA-Gerät
  - condition: template
    value_template: "{{ device_id(fired) == remote }}"
  # Nur taste oder schalterstellung, Nummer 1-9
  - condition: template
    value_template: "{{ (is_taste or is_schalter) and fired_num in range(1, 10) }}"
  # Schalterstellung nur bei Flanke 0→1 (Puls-Start), nicht 1→0
  - condition: template
    value_template: >
      {{ is_taste or (is_schalter and
         trigger.event.data.new_state.state | int(0) == 1) }}

action:
  - choose:

      # ── Szene 1 ──────────────────────────────────────
      - conditions: "{{ scene_num == 1 and action_type == 'press' and light1 != {} }}"
        sequence:
          - if: "{{ press_action_1 | length == 0 }}"
            then:
              - action: light.toggle
                target: !input light1
            else: !input press_action_1

      - conditions: "{{ scene_num == 1 and action_type == 'inc' and light1 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light1
            data:
              brightness_step_pct: "{{ step | int }}"
              transition: 0.3

      - conditions: "{{ scene_num == 1 and action_type == 'dec' and light1 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light1
            data:
              brightness_step_pct: "{{ (step | int) * -1 }}"
              transition: 0.3

      # ── Szene 2 ──────────────────────────────────────
      - conditions: "{{ scene_num == 2 and action_type == 'press' and light2 != {} }}"
        sequence:
          - if: "{{ press_action_2 | length == 0 }}"
            then:
              - action: light.toggle
                target: !input light2
            else: !input press_action_2

      - conditions: "{{ scene_num == 2 and action_type == 'inc' and light2 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light2
            data:
              brightness_step_pct: "{{ step | int }}"
              transition: 0.3

      - conditions: "{{ scene_num == 2 and action_type == 'dec' and light2 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light2
            data:
              brightness_step_pct: "{{ (step | int) * -1 }}"
              transition: 0.3

      # ── Szene 3 ──────────────────────────────────────
      - conditions: "{{ scene_num == 3 and action_type == 'press' and light3 != {} }}"
        sequence:
          - if: "{{ press_action_3 | length == 0 }}"
            then:
              - action: light.toggle
                target: !input light3
            else: !input press_action_3

      - conditions: "{{ scene_num == 3 and action_type == 'inc' and light3 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light3
            data:
              brightness_step_pct: "{{ step | int }}"
              transition: 0.3

      - conditions: "{{ scene_num == 3 and action_type == 'dec' and light3 != {} }}"
        sequence:
          - action: light.turn_on
            target: !input light3
            data:
              brightness_step_pct: "{{ (step | int) * -1 }}"
              transition: 0.3